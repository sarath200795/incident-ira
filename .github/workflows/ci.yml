name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Production build
        # Dummy Firebase env so the build's config check passes; no secrets needed.
        env:
          VITE_FIREBASE_API_KEY: ci-dummy-key
          VITE_FIREBASE_AUTH_DOMAIN: ci.example.com
          VITE_FIREBASE_PROJECT_ID: ci-dummy
          VITE_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000000000000:web:cidummy'
        run: npm run build

  rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Firestore emulator requires a JRE.
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Firestore rules tests (emulator)
        run: npm run test:rules
